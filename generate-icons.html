<!DOCTYPE html>
<html>
<head>
    <title>Generate Fun-da Icons</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&display=swap" rel="stylesheet">
</head>
<body>
    <h1>Fun-da Icon Generator</h1>
    <p>Open browser console and icons will be generated as data URLs. Right-click each preview to save.</p>
    <div id="previews" style="display:flex;gap:16px;flex-wrap:wrap;padding:16px;"></div>
    <script>
        // Wait for Inter font to load
        document.fonts.ready.then(() => {
            const sizes = [72, 96, 128, 144, 152, 180, 192, 384, 512];
            const container = document.getElementById('previews');
            
            sizes.forEach(size => {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                
                // Background — warm off-white matching the app
                const radius = size * 0.22;
                ctx.beginPath();
                ctx.moveTo(radius, 0);
                ctx.lineTo(size - radius, 0);
                ctx.quadraticCurveTo(size, 0, size, radius);
                ctx.lineTo(size, size - radius);
                ctx.quadraticCurveTo(size, size, size - radius, size);
                ctx.lineTo(radius, size);
                ctx.quadraticCurveTo(0, size, 0, size - radius);
                ctx.lineTo(0, radius);
                ctx.quadraticCurveTo(0, 0, radius, 0);
                ctx.closePath();
                ctx.fillStyle = '#FFF5F0';
                ctx.fill();

                // "F" in orange gradient
                const fontSize = size * 0.7;
                ctx.font = `800 ${fontSize}px Inter, system-ui, sans-serif`;
                ctx.textBaseline = 'middle';
                ctx.letterSpacing = `${-size * 0.03}px`;

                const fMetrics = ctx.measureText('F');
                const dMetrics = ctx.measureText('d');
                const totalW = fMetrics.width + dMetrics.width;
                const startX = (size - totalW) / 2;
                const centerY = size * 0.52;

                // "F" — orange gradient
                const gradient = ctx.createLinearGradient(startX, 0, startX + fMetrics.width, size);
                gradient.addColorStop(0, '#FF6B35');
                gradient.addColorStop(1, '#E85A2A');
                ctx.fillStyle = gradient;
                ctx.fillText('F', startX, centerY);

                // "d" — teal
                ctx.fillStyle = '#0D9488';
                ctx.fillText('d', startX + fMetrics.width, centerY);
                
                // Show preview
                const img = document.createElement('img');
                img.src = canvas.toDataURL('image/png');
                img.style.cssText = `width:${Math.min(size, 128)}px;height:${Math.min(size, 128)}px;border:1px solid #ddd;border-radius:16px;`;
                img.title = `${size}x${size}`;
                container.appendChild(img);

                console.log(`Icon ${size}x${size}:`, canvas.toDataURL('image/png'));
            });
        });
    </script>
</body>
</html>
